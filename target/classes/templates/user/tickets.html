<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Tickets — Railway Service</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="layout">
  <div th:replace="~{fragments/layout :: sidebar('tickets','user')}"></div>
  <div class="main">
    <div th:replace="~{fragments/layout :: topHeader(${user.name})}"></div>
    <div style="padding-top:24px;">

      <div class="page-hdr">
        <div>
          <div class="page-title">🎫 My Tickets</div>
          <div class="page-sub">View and manage all your bookings</div>
        </div>
        <a th:href="@{/user/search}" class="btn btn-primary">+ Book New</a>
      </div>

      <div th:replace="~{fragments/layout :: alerts}"></div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">All Bookings</span>
          <span style="font-size:12px;color:var(--muted2);" th:text="${#lists.size(tickets)} + ' total'"></span>
        </div>

        <div th:if="${#lists.isEmpty(tickets)}" style="padding:50px;text-align:center;color:var(--muted2);">
          <div style="font-size:40px;margin-bottom:12px;">🎫</div>
          No tickets booked yet. <a th:href="@{/user/search}" style="color:var(--primary);">Book your first train!</a>
        </div>

        <div class="table-wrap" th:if="${!#lists.isEmpty(tickets)}">
          <table>
            <thead>
              <tr>
                <th>Ticket ID</th>
                <th>Train</th>
                <th>Route</th>
                <th>Journey Date</th>
                <th>Seat</th>
                <th>Type</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="t : ${tickets}">
                <td class="td-mono" th:text="'#TK-' + ${#strings.toString(t.ticketId).length() < 4 ? '0'.repeat(4-#strings.toString(t.ticketId).length()) : ''} + ${t.ticketId}"></td>
                <td>
                  <div style="font-weight:600;color:var(--text);" th:text="${t.train.trainName}"></div>
                  <div style="font-size:11px;font-family:monospace;color:var(--muted2);" th:text="'#' + ${t.train.trainNumber}"></div>
                </td>
                <td th:text="${t.train.source} + ' → ' + ${t.train.destination}"></td>
                <td th:text="${t.journeyDate}"></td>
                <td class="td-mono" th:text="${t.seatNumber}"></td>
                <td>
                  <span class="badge"
                        th:classappend="${t.seatType.name() == 'AC'} ? 'badge-purple' : (${t.seatType.name() == 'Sleeper'} ? 'badge-blue' : 'badge-green')"
                        th:text="${t.seatType}"></span>
                </td>
                <td class="td-amt">₹<span th:text="${#numbers.formatDecimal(t.amount,1,0)}"></span></td>
                <td>
                  <span class="badge"
                        th:classappend="${t.status.name() == 'BOOKED'} ? 'badge-green' : 'badge-red'"
                        th:text="${t.status.name() == 'BOOKED'} ? '● Confirmed' : '● Cancelled'"></span>
                </td>
                <td>
                  <form th:if="${t.status.name() == 'BOOKED'}"
                        th:action="@{/user/tickets/cancel/{id}(id=${t.ticketId})}"
                        method="post"
                        onsubmit="return confirm('Cancel this ticket? Refund will be 80% (if 24+hrs) or 50%.');">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-danger btn-sm">Cancel</button>
                  </form>
                  <span th:if="${t.status.name() == 'CANCELLED'}" style="font-size:12px;color:var(--muted);">—</span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
