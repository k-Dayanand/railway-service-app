<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account — Railway Service</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="auth-layout">

  <div class="auth-left">
    <div style="position:relative;z-index:2;">
      <div class="auth-icon">🎫</div>
      <div class="auth-title">Join RailwayMS<br>Today</div>
      <div class="auth-sub">Book tickets, track trains, travel smarter.</div>
      <div class="auth-feature"><div class="auth-feature-icon">✅</div> Free account, always</div>
      <div class="auth-feature"><div class="auth-feature-icon">✅</div> Instant booking confirmation</div>
      <div class="auth-feature"><div class="auth-feature-icon">✅</div> Easy cancellations &amp; refunds</div>
    </div>
  </div>

  <div class="auth-right">
    <div style="max-width:400px;margin:0 auto;width:100%;">

      <div class="form-title">Create Account 🎉</div>
      <div class="form-subtitle">Fill in your details to get started</div>

      <div th:if="${error}" class="alert alert-error">❌ &nbsp;<span th:text="${error}"></span></div>

      <form th:action="@{/register}" method="post" th:object="${registerDTO}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" th:field="*{name}" class="form-control" placeholder="Arjun Sharma" required/>
          <div th:if="${#fields.hasErrors('name')}" class="form-error" th:errors="*{name}"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" th:field="*{email}" class="form-control" placeholder="you@example.com" required/>
          <div th:if="${#fields.hasErrors('email')}" class="form-error" th:errors="*{email}"></div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" th:field="*{password}" class="form-control" placeholder="Min 6 chars" required/>
            <div th:if="${#fields.hasErrors('password')}" class="form-error" th:errors="*{password}"></div>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input type="password" th:field="*{confirmPassword}" class="form-control" placeholder="Re-enter" required/>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Phone (optional)</label>
          <input type="tel" th:field="*{phone}" class="form-control" placeholder="10-digit number"/>
          <div th:if="${#fields.hasErrors('phone')}" class="form-error" th:errors="*{phone}"></div>
        </div>

        <button type="submit" class="btn btn-primary btn-full">Create Account →</button>
      </form>

      <div class="auth-link">Already have an account? <a th:href="@{/login}">Sign In</a></div>
    </div>
  </div>

</div>
</body>
</html>
