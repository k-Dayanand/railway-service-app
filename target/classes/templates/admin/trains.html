<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Trains — Railway Service</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="layout">
  <div th:replace="~{fragments/layout :: sidebar('trains','admin')}"></div>
  <div class="main">
    <div th:replace="~{fragments/layout :: topHeader('')}"></div>
    <div style="padding-top:24px;">

      <div class="page-hdr">
        <div>
          <div class="page-title">🚆 Manage Trains</div>
          <div class="page-sub">Add, edit, or remove trains</div>
        </div>
      </div>

      <div th:replace="~{fragments/layout :: alerts}"></div>

      <div class="grid-2" style="align-items:start;">

        <!-- FORM: Add / Edit -->
        <div class="card" style="position:sticky;top:20px;">
          <div class="card-header">
            <span class="card-title" th:text="${editMode != null and editMode} ? '✏ Edit Train' : '＋ Add New Train'"></span>
          </div>
          <div class="card-body">

            <form th:if="${editMode == null or !editMode}"
                  th:action="@{/admin/trains/add}" method="post" th:object="${train}">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <div th:replace="~{admin/trains :: trainForm}"></div>
            </form>

            <form th:if="${editMode != null and editMode}"
                  th:action="@{/admin/trains/edit/{id}(id=${train.trainId})}" method="post" th:object="${train}">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <div th:replace="~{admin/trains :: trainForm}"></div>
              <a th:href="@{/admin/trains}" class="btn btn-ghost btn-sm" style="margin-top:8px;">Cancel Edit</a>
            </form>

          </div>
        </div>

        <!-- Train Table -->
        <div class="card">
          <div class="card-header"><span class="card-title">All Trains</span></div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th><th>Number</th><th>Route</th>
                  <th>Times</th><th>Seats</th><th>Status</th><th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="t : ${trains}">
                  <td style="font-weight:600;color:var(--text);" th:text="${t.trainName}"></td>
                  <td class="td-mono" th:text="${t.trainNumber}"></td>
                  <td th:text="${t.source} + ' → ' + ${t.destination}"></td>
                  <td th:text="${t.departureTime} + ' / ' + ${t.arrivalTime}"></td>
                  <td style="font-size:12px;">
                    <span class="badge badge-blue" th:text="'SL:' + ${t.sleeperSeats}"></span>
                    <span class="badge badge-purple" th:text="'AC:' + ${t.acSeats}"></span>
                    <span class="badge badge-green" th:text="'GN:' + ${t.generalSeats}"></span>
                  </td>
                  <td>
                    <span class="badge" th:classappend="${t.status.name()=='ACTIVE'}?'badge-green':'badge-red'"
                          th:text="${t.status}"></span>
                  </td>
                  <td>
                    <a th:href="@{/admin/trains/edit/{id}(id=${t.trainId})}" class="btn btn-ghost btn-sm">Edit</a>
                    <form th:action="@{/admin/trains/delete/{id}(id=${t.trainId})}" method="post" style="display:inline;"
                          onsubmit="return confirm('Delete this train?')">
                      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                      <button type="submit" class="btn btn-danger btn-sm">Del</button>
                    </form>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Reusable Train Form Fragment -->
<th:block th:fragment="trainForm">
  <div class="form-group">
    <label class="form-label">Train Name</label>
    <input type="text" th:field="*{trainName}" class="form-control" placeholder="Rajdhani Express" required/>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Train Number</label>
      <input type="text" th:field="*{trainNumber}" class="form-control" placeholder="12301" required/>
    </div>
    <div class="form-group">
      <label class="form-label">Status</label>
      <select th:field="*{status}" class="form-control">
        <option value="ACTIVE">Active</option>
        <option value="INACTIVE">Inactive</option>
      </select>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Source</label>
      <input type="text" th:field="*{source}" class="form-control" placeholder="Delhi" required/>
    </div>
    <div class="form-group">
      <label class="form-label">Destination</label>
      <input type="text" th:field="*{destination}" class="form-control" placeholder="Mumbai" required/>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Departure Time</label>
      <input type="text" th:field="*{departureTime}" class="form-control" placeholder="16:00" required/>
    </div>
    <div class="form-group">
      <label class="form-label">Arrival Time</label>
      <input type="text" th:field="*{arrivalTime}" class="form-control" placeholder="08:00" required/>
    </div>
  </div>
  <div style="font-size:11px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.6px;margin:12px 0 8px;">Seats &amp; Fares</div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">Sleeper Seats</label>
      <input type="number" th:field="*{sleeperSeats}" class="form-control" min="0" placeholder="150"/>
    </div>
    <div class="form-group">
      <label class="form-label">Sleeper Fare (₹)</label>
      <input type="number" th:field="*{fareSleeper}" class="form-control" min="0" step="0.01" placeholder="800"/>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">AC Seats</label>
      <input type="number" th:field="*{acSeats}" class="form-control" min="0" placeholder="100"/>
    </div>
    <div class="form-group">
      <label class="form-label">AC Fare (₹)</label>
      <input type="number" th:field="*{fareAC}" class="form-control" min="0" step="0.01" placeholder="1500"/>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">General Seats</label>
      <input type="number" th:field="*{generalSeats}" class="form-control" min="0" placeholder="50"/>
    </div>
    <div class="form-group">
      <label class="form-label">General Fare (₹)</label>
      <input type="number" th:field="*{fareGeneral}" class="form-control" min="0" step="0.01" placeholder="300"/>
    </div>
  </div>
  <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">
    Save Train →
  </button>
</th:block>

</body>
</html>
