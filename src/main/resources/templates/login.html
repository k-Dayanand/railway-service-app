<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Railway Service</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="auth-layout">

  <!-- LEFT: Branding -->
  <div class="auth-left">
    <div style="position:relative;z-index:2;">
      <div class="auth-icon">🚆</div>
      <div class="auth-title">Railway Service<br>Management System</div>
      <div class="auth-sub">Your journey, our responsibility.</div>

      <div class="auth-feature"><div class="auth-feature-icon">🎫</div> Instant ticket booking</div>
      <div class="auth-feature"><div class="auth-feature-icon">🚆</div> Live train tracking</div>
      <div class="auth-feature"><div class="auth-feature-icon">💳</div> Secure payments</div>
      <div class="auth-feature"><div class="auth-feature-icon">↩</div> Easy cancellations</div>
    </div>
  </div>

  <!-- RIGHT: Login Form -->
  <div class="auth-right">
    <div style="max-width:380px;margin:0 auto;width:100%;">

      <div class="form-title">Welcome back 👋</div>
      <div class="form-subtitle">Sign in to your account</div>

      <!-- Flash messages -->
      <div th:if="${error}"   class="alert alert-error"  >❌ &nbsp;<span th:text="${error}"></span></div>
      <div th:if="${logout}"  class="alert alert-success" >✅ &nbsp;<span th:text="${logout}"></span></div>
      <div th:if="${success}" class="alert alert-success" >✅ &nbsp;<span th:text="${success}"></span></div>

      <!-- Form -->
      <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus/>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
        </div>

        <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">
          Sign In →
        </button>
      </form>

      <div class="auth-link" style="margin-top:16px;">
        Don't have an account? <a th:href="@{/register}">Sign Up</a>
      </div>

    
    </div>
  </div>

</div>
</body>
</html>
